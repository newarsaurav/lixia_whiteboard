<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Whiteboard</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    background: #0f1115;
    color: #e6e8ec;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 40px;
  }
  .row {
    display: flex;
    gap: 8px;
    width: 100%;
    max-width: 980px;
    margin-bottom: 12px;
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;
  }
  input[type="text"] {
    flex: 1;
    min-width: 280px;
    background: #171a21;
    color: #e6e8ec;
    border: 1px solid #2a2e38;
    border-radius: 6px;
    padding: 9px 12px;
    font-family: inherit;
    font-size: 13px;
  }
  input[type="text"]:focus { outline: none; border-color: #4f8ef7; }
  button {
    background: #171a21;
    color: #e6e8ec;
    border: 1px solid #2a2e38;
    border-radius: 6px;
    padding: 9px 16px;
    font-family: inherit;
    font-size: 13px;
    cursor: pointer;
    white-space: nowrap;
  }
  button:hover { border-color: #4f8ef7; }
  button:disabled { opacity: 0.4; cursor: default; }
  .speed-label {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: #8b93a3;
    white-space: nowrap;
  }
  .speed-label input[type="range"] { accent-color: #4f8ef7; width: 90px; }
  #speedVal { color: #e6e8ec; min-width: 28px; }
  #status {
    font-size: 12px;
    color: #8b93a3;
    margin-bottom: 10px;
    min-height: 16px;
    text-align: center;
  }
  #stage-wrap {
    background: #171a21;
    border: 1px solid #2a2e38;
    border-radius: 10px;
    padding: 8px;
    max-width: 100%;
    overflow-x: auto;
  }
  svg { display: block; background: #0c0e12; border-radius: 6px; }
  .lbl      { fill: #f4f6f9; font-size: 13px; font-family: ui-monospace,monospace; text-anchor: middle; dominant-baseline: middle; pointer-events: none; }
  .conn-lbl { fill: #8b93a3; font-size: 11px; font-family: ui-monospace,monospace; text-anchor: middle; }
  .map-lbl  { fill: #f4f6f9; font-size: 14px; font-weight: 700; font-family: ui-monospace,monospace; text-anchor: middle; dominant-baseline: middle; pointer-events: none; }
  .sketch-lbl { fill: #8b93a3; font-size: 11px; font-family: ui-monospace,monospace; text-anchor: middle; }
  .chart-title{ fill: #f4f6f9; font-size: 15px; font-weight: 700; font-family: ui-monospace,monospace; text-anchor: middle; }
  .chart-axis { fill: #8b93a3; font-size: 11px; font-family: ui-monospace,monospace; text-anchor: middle; }
  .chart-val  { fill: #e6e8ec; font-size: 11px; font-family: ui-monospace,monospace; text-anchor: middle; }
  .chart-legend{ fill: #8b93a3; font-size: 11px; font-family: ui-monospace,monospace; }
  .hint     { font-size: 11px; color: #555d6e; margin-top: 12px; text-align: center; }
  .hint span { color: #4f8ef7; }
</style>
</head>
<body>

<div class="row">
  <input type="text" id="promptInput"
    placeholder='Try: "draw a flowchart"  or  "chart last 5 days temp of Kathmandu"  or  "map of Nepal"'>
  <button id="drawBtn">Draw</button>
  <button id="clearBtn">Clear</button>
  <label class="speed-label">
    Speed <span id="speedVal">1x</span>
    <input type="range" id="speedSlider" min="0.25" max="3" step="0.25" value="1">
  </label>
</div>
<div id="status">Ready</div>

<div id="stage-wrap">
  <svg id="stage" viewBox="0 0 960 620" width="960" height="620">
    <defs>
      <marker id="ah" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
        <path d="M0,0 L10,4 L0,8 Z" fill="#6b7280"/>
      </marker>
    </defs>
    <g id="connectors"></g>
    <g id="shapes"></g>
    <g id="pencilLayer"></g>
  </svg>
</div>

<p class="hint">
  Everything you type is drawn on this board — diagrams, sketches, and charts all need
  <span>server.py</span> running on :8000 (maps also fetch real OSM boundaries; weather
  charts fetch real Open-Meteo data)
</p>

<!-- D3 + TopoJSON for maps -->
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>

<script>
/* ════════════════════════════════════════════════════════
   CONFIG
════════════════════════════════════════════════════════ */
const SERVER_URL = "http://localhost:8000/draw";
const GRID_PX    = 40;
const SVG_W = 960, SVG_H = 620, PAD = 44;
const BASE_TRACE = 700;   // ms at 1x for shapes
const BASE_SKETCH= 550;   // ms at 1x per freeform sketch path
const BASE_MAP   = 3500;  // ms at 1x for map trace
const BASE_CHART = 900;   // ms at 1x per chart series/axis trace

/* ════════════════════════════════════════════════════════
   REFS
════════════════════════════════════════════════════════ */
const shapesG    = document.getElementById("shapes");
const connectorsG= document.getElementById("connectors");
const pencilLayer= document.getElementById("pencilLayer");
const promptInput= document.getElementById("promptInput");
const drawBtn    = document.getElementById("drawBtn");
const clearBtn   = document.getElementById("clearBtn");
const speedSlider= document.getElementById("speedSlider");
const speedValEl = document.getElementById("speedVal");
const statusEl   = document.getElementById("status");

const speed     = ()  => parseFloat(speedSlider.value);
const traceDur  = ()  => BASE_TRACE / speed();
const sketchDur = ()  => BASE_SKETCH / speed();
const mapDur    = ()  => BASE_MAP   / speed();
const chartDur  = ()  => BASE_CHART / speed();
const setStatus = (t) => { statusEl.textContent = t; };

speedSlider.addEventListener("input", () => { speedValEl.textContent = speed() + "x"; });

/* ════════════════════════════════════════════════════════
   CLEAR
════════════════════════════════════════════════════════ */
function clearStage() {
  shapesG.innerHTML    = "";
  connectorsG.innerHTML= "";
  pencilLayer.innerHTML= "";
}
clearBtn.addEventListener("click", clearStage);

/* ════════════════════════════════════════════════════════
   PENCIL ICON
════════════════════════════════════════════════════════ */
function makePencil() {
  const g = document.createElementNS("http://www.w3.org/2000/svg","g");
  g.innerHTML = `<g transform="translate(-2,-16)">
    <polygon points="0,16 4,16 2,20" fill="#f4c98b" stroke="#10131a" stroke-width="0.5"/>
    <rect x="-0.5" y="2" width="5" height="14" rx="1" fill="#f7d9a8" stroke="#10131a" stroke-width="0.5"/>
    <rect x="-0.5" y="-1" width="5" height="3" rx="0.5" fill="#e3675c"/>
  </g>`;
  g.style.filter = "drop-shadow(0 1px 3px rgba(0,0,0,0.7))";
  return g;
}

/* ════════════════════════════════════════════════════════
   CORE PENCIL TRACE (works on any SVG path element)
════════════════════════════════════════════════════════ */
function traceEl(pathEl, durationMs) {
  return new Promise((resolve) => {
    const len = pathEl.getTotalLength();
    if (len < 1) { resolve(); return; }

    pathEl.style.strokeDasharray  = len;
    pathEl.style.strokeDashoffset = len;

    const pencil = makePencil();
    pencilLayer.appendChild(pencil);

    const t0 = performance.now();
    function tick(now) {
      const t     = Math.min(1, (now - t0) / durationMs);
      const eased = t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
      const drawn = eased * len;
      pathEl.style.strokeDashoffset = len - drawn;

      const pt  = pathEl.getPointAtLength(Math.min(drawn, len - 0.5));
      const ptN = pathEl.getPointAtLength(Math.min(drawn + 1.5, len));
      const ang = Math.atan2(ptN.y - pt.y, ptN.x - pt.x) * 180/Math.PI;
      pencil.setAttribute("transform", `translate(${pt.x},${pt.y}) rotate(${ang+90})`);

      if (t < 1) requestAnimationFrame(tick);
      else { pencil.remove(); resolve(); }
    }
    requestAnimationFrame(tick);
  });
}

/* ════════════════════════════════════════════════════════
   SHAPE HELPERS (grid-based, from Gemini)
════════════════════════════════════════════════════════ */
function toPx(s) {
  return { x:s.grid_x*GRID_PX, y:s.grid_y*GRID_PX, w:s.grid_width*GRID_PX, h:s.grid_height*GRID_PX };
}
function ctr(px) { return { cx: px.x+px.w/2, cy: px.y+px.h/2 }; }

function outlinePath(type, px) {
  const c = ctr(px);
  if (type==="rect")
    return `M${px.x},${px.y} L${px.x+px.w},${px.y} L${px.x+px.w},${px.y+px.h} L${px.x},${px.y+px.h} Z`;
  if (type==="diamond")
    return `M${c.cx},${px.y} L${px.x+px.w},${c.cy} L${c.cx},${px.y+px.h} L${px.x},${c.cy} Z`;
  const rx=px.w/2, ry=px.h/2;
  return `M${c.cx-rx},${c.cy} A${rx},${ry} 0 1 0 ${c.cx+rx},${c.cy} A${rx},${ry} 0 1 0 ${c.cx-rx},${c.cy} Z`;
}

function wrapLabel(textEl, label, maxW) {
  const words = label.split(" "), lines = [];
  let line = "";
  const tmp = document.createElementNS("http://www.w3.org/2000/svg","tspan");
  textEl.appendChild(tmp);
  words.forEach((w) => {
    const test = line ? line+" "+w : w;
    tmp.textContent = test;
    if (tmp.getComputedTextLength() > maxW && line) { lines.push(line); line=w; }
    else line=test;
  });
  lines.push(line);
  textEl.removeChild(tmp);
  return lines;
}

function addLabel(px, label, g) {
  const c=ctr(px), maxW=px.w-12, lh=16;
  const text = document.createElementNS("http://www.w3.org/2000/svg","text");
  text.setAttribute("x", c.cx);
  text.setAttribute("class","lbl");
  text.style.opacity = "0";
  text.style.transition = "opacity 200ms ease";
  g.appendChild(text);

  const lines = wrapLabel(text, label, maxW);
  const startY = c.cy - ((lines.length*lh)/2) + lh/2;
  lines.forEach((ln,i) => {
    const ts = document.createElementNS("http://www.w3.org/2000/svg","tspan");
    ts.setAttribute("x", c.cx);
    ts.setAttribute("y", startY + i*lh);
    ts.textContent = ln;
    text.appendChild(ts);
  });
  return text;
}

function drawShape(shape) {
  return new Promise(async (resolve) => {
    const px = toPx(shape);
    const d  = outlinePath(shape.shape_type, px);

    const fillEl = document.createElementNS("http://www.w3.org/2000/svg","path");
    fillEl.setAttribute("d", d);
    fillEl.setAttribute("fill", shape.fill || "#4f8ef7");
    fillEl.setAttribute("fill-opacity","0");
    fillEl.style.transition = "fill-opacity 300ms ease";
    shapesG.appendChild(fillEl);

    const strokeEl = document.createElementNS("http://www.w3.org/2000/svg","path");
    strokeEl.setAttribute("d", d);
    strokeEl.setAttribute("fill","none");
    strokeEl.setAttribute("stroke","#1a1d26");
    strokeEl.setAttribute("stroke-width","2.5");
    strokeEl.setAttribute("stroke-linecap","round");
    strokeEl.setAttribute("stroke-linejoin","round");
    shapesG.appendChild(strokeEl);

    let labelEl = null;
    if (shape.label) labelEl = addLabel(px, shape.label, shapesG);

    await traceEl(strokeEl, traceDur());
    fillEl.setAttribute("fill-opacity","0.88");
    if (labelEl) labelEl.style.opacity = "1";
    resolve(px);
  });
}

function edgePt(px, tx, ty) {
  const c=ctr(px), dx=tx-c.cx, dy=ty-c.cy;
  const sx=dx===0?Infinity:(px.w/2)/Math.abs(dx);
  const sy=dy===0?Infinity:(px.h/2)/Math.abs(dy);
  const s=Math.min(sx,sy);
  return {x:c.cx+dx*s, y:c.cy+dy*s};
}

function drawConnector(fromPx, toPx, label) {
  const fc=ctr(fromPx), tc=ctr(toPx);
  const s=edgePt(fromPx,tc.cx,tc.cy), e=edgePt(toPx,fc.cx,fc.cy);
  const line = document.createElementNS("http://www.w3.org/2000/svg","line");
  line.setAttribute("x1",s.x); line.setAttribute("y1",s.y);
  line.setAttribute("x2",s.x); line.setAttribute("y2",s.y);
  line.setAttribute("stroke","#6b7280");
  line.setAttribute("stroke-width","2");
  line.setAttribute("marker-end","url(#ah)");
  connectorsG.appendChild(line);

  const growMs = 300/speed(), t0=performance.now();
  function grow(now) {
    const t=Math.min(1,(now-t0)/growMs);
    line.setAttribute("x2", s.x+(e.x-s.x)*t);
    line.setAttribute("y2", s.y+(e.y-s.y)*t);
    if (t<1) requestAnimationFrame(grow);
  }
  requestAnimationFrame(grow);

  if (label) {
    const txt = document.createElementNS("http://www.w3.org/2000/svg","text");
    txt.setAttribute("x",(s.x+e.x)/2); txt.setAttribute("y",(s.y+e.y)/2-6);
    txt.setAttribute("class","conn-lbl"); txt.textContent=label;
    connectorsG.appendChild(txt);
  }
}

/* ════════════════════════════════════════════════════════
   FREEFORM SKETCH PATHS (raw SVG 'd' strings, from Gemini)
   Renders any object/scene/icon the model describes as one or more
   pencil-traced strokes, same animation machinery as shapes/maps.
════════════════════════════════════════════════════════ */
function drawSketchPath(p) {
  return new Promise(async (resolve) => {
    if (!p.d) { resolve(); return; }

    let fillEl = null;
    const hasFill = p.fill && p.fill !== "none";
    if (hasFill) {
      fillEl = document.createElementNS("http://www.w3.org/2000/svg","path");
      fillEl.setAttribute("d", p.d);
      fillEl.setAttribute("fill", p.fill);
      fillEl.setAttribute("fill-opacity","0");
      fillEl.style.transition = "fill-opacity 300ms ease";
      shapesG.appendChild(fillEl);
    }

    const strokeEl = document.createElementNS("http://www.w3.org/2000/svg","path");
    strokeEl.setAttribute("d", p.d);
    strokeEl.setAttribute("fill","none");
    strokeEl.setAttribute("stroke", p.stroke || "#e6e8ec");
    strokeEl.setAttribute("stroke-width", p.stroke_width || 2.5);
    strokeEl.setAttribute("stroke-linecap","round");
    strokeEl.setAttribute("stroke-linejoin","round");
    shapesG.appendChild(strokeEl);

    if (p.label) {
      const bbox = strokeEl.getBBox();
      const txt = document.createElementNS("http://www.w3.org/2000/svg","text");
      txt.setAttribute("x", bbox.x + bbox.width/2);
      txt.setAttribute("y", bbox.y + bbox.height + 16);
      txt.setAttribute("class","sketch-lbl");
      txt.style.opacity = "0";
      txt.style.transition = "opacity 200ms ease";
      txt.textContent = p.label;
      shapesG.appendChild(txt);
      traceEl(strokeEl, sketchDur()).then(() => {
        if (fillEl) fillEl.setAttribute("fill-opacity","0.85");
        txt.style.opacity = "1";
        resolve();
      });
      return;
    }

    await traceEl(strokeEl, sketchDur());
    if (fillEl) fillEl.setAttribute("fill-opacity","0.85");
    resolve();
  });
}

/* ════════════════════════════════════════════════════════
   CHART DRAWING (bar / line, real data from Gemini's data tools)
════════════════════════════════════════════════════════ */
const CHART_COLORS = ["#4f8ef7", "#f2a94e", "#7fd88f", "#e3675c", "#b48ff0"];

function niceMinMax(values) {
  let lo = Math.min(0, ...values), hi = Math.max(...values);
  if (hi === lo) hi = lo + 1;
  const pad = (hi - lo) * 0.15;
  return { lo: lo < 0 ? lo - pad : 0, hi: hi + pad };
}

async function drawChart(chart) {
  const area = { x0: 90, y0: 60, x1: 910, y1: 520 };
  const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
  shapesG.appendChild(g);

  const allVals = chart.series.flatMap(s => s.values);
  const { lo, hi } = niceMinMax(allVals);
  const n = chart.x_labels.length;
  const xStep = (area.x1 - area.x0) / Math.max(1, n - (chart.chart_type === "line" ? 1 : 0));
  const yScale = v => area.y1 - ((v - lo) / (hi - lo)) * (area.y1 - area.y0);

  // Title
  if (chart.title) {
    const t = document.createElementNS("http://www.w3.org/2000/svg", "text");
    t.setAttribute("x", (area.x0 + area.x1) / 2);
    t.setAttribute("y", 30);
    t.setAttribute("class", "chart-title");
    t.style.opacity = "0"; t.style.transition = "opacity 300ms ease";
    t.textContent = chart.title;
    g.appendChild(t);
    requestAnimationFrame(() => { t.style.opacity = "1"; });
  }

  // Axes (traced like a sketch)
  const axisD = `M${area.x0},${area.y0} L${area.x0},${area.y1} L${area.x1},${area.y1}`;
  const axisEl = document.createElementNS("http://www.w3.org/2000/svg", "path");
  axisEl.setAttribute("d", axisD);
  axisEl.setAttribute("fill", "none");
  axisEl.setAttribute("stroke", "#4a5162");
  axisEl.setAttribute("stroke-width", "2");
  g.appendChild(axisEl);
  await traceEl(axisEl, chartDur() * 0.5);

  // x-axis labels
  chart.x_labels.forEach((lbl, i) => {
    const x = area.x0 + i * xStep + (chart.chart_type === "bar" ? xStep / 2 : 0);
    const txt = document.createElementNS("http://www.w3.org/2000/svg", "text");
    txt.setAttribute("x", x); txt.setAttribute("y", area.y1 + 20);
    txt.setAttribute("class", "chart-axis");
    txt.style.opacity = "0"; txt.style.transition = "opacity 200ms ease";
    txt.textContent = lbl;
    g.appendChild(txt);
    requestAnimationFrame(() => { txt.style.opacity = "1"; });
  });

  // y-axis min/max labels
  [lo, hi].forEach(v => {
    const txt = document.createElementNS("http://www.w3.org/2000/svg", "text");
    txt.setAttribute("x", area.x0 - 14); txt.setAttribute("y", yScale(v) + 4);
    txt.setAttribute("class", "chart-axis");
    txt.setAttribute("text-anchor", "end");
    txt.textContent = (chart.y_unit ? v.toFixed(1) : Math.round(v)) + (chart.y_unit ? " " + chart.y_unit : "");
    g.appendChild(txt);
  });

  const nSeries = chart.series.length;

  if (chart.chart_type === "bar") {
    const groupW = xStep * 0.6;
    const barW = groupW / nSeries;
    for (let si = 0; si < nSeries; si++) {
      const s = chart.series[si];
      const color = s.color || CHART_COLORS[si % CHART_COLORS.length];
      for (let i = 0; i < n; i++) {
        const v = s.values[i] ?? 0;
        const xCenter = area.x0 + i * xStep + xStep / 2;
        const bx = xCenter - groupW / 2 + si * barW;
        const yTop = yScale(v), yBase = yScale(Math.max(0, lo));
        const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
        rect.setAttribute("x", bx);
        rect.setAttribute("width", barW * 0.85);
        rect.setAttribute("y", yBase);
        rect.setAttribute("height", 0);
        rect.setAttribute("fill", color);
        rect.setAttribute("rx", 2);
        g.appendChild(rect);

        const label = document.createElementNS("http://www.w3.org/2000/svg", "text");
        label.setAttribute("x", bx + barW * 0.425);
        label.setAttribute("y", yTop - 8);
        label.setAttribute("class", "chart-val");
        label.style.opacity = "0"; label.style.transition = "opacity 200ms ease";
        label.textContent = v;
        g.appendChild(label);

        const growMs = 260 / speed(), t0 = performance.now();
        const top = Math.min(yTop, yBase), h = Math.abs(yBase - yTop);
        await new Promise(resolve => {
          function grow(now) {
            const t = Math.min(1, (now - t0) / growMs);
            rect.setAttribute("y", yBase - t * (yBase - top));
            rect.setAttribute("height", t * h);
            if (t < 1) requestAnimationFrame(grow);
            else { label.style.opacity = "1"; resolve(); }
          }
          requestAnimationFrame(grow);
        });
        await sleep(40 / speed());
      }
    }
  } else {
    // line chart
    for (let si = 0; si < nSeries; si++) {
      const s = chart.series[si];
      const color = s.color || CHART_COLORS[si % CHART_COLORS.length];
      const pts = s.values.map((v, i) => [area.x0 + i * xStep, yScale(v)]);
      const d = pts.map((p, i) => (i === 0 ? "M" : "L") + p[0] + "," + p[1]).join(" ");
      const lineEl = document.createElementNS("http://www.w3.org/2000/svg", "path");
      lineEl.setAttribute("d", d);
      lineEl.setAttribute("fill", "none");
      lineEl.setAttribute("stroke", color);
      lineEl.setAttribute("stroke-width", "2.5");
      lineEl.setAttribute("stroke-linecap", "round");
      lineEl.setAttribute("stroke-linejoin", "round");
      g.appendChild(lineEl);
      await traceEl(lineEl, chartDur());

      pts.forEach((p, i) => {
        const dot = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        dot.setAttribute("cx", p[0]); dot.setAttribute("cy", p[1]); dot.setAttribute("r", 4);
        dot.setAttribute("fill", color);
        g.appendChild(dot);
        const label = document.createElementNS("http://www.w3.org/2000/svg", "text");
        label.setAttribute("x", p[0]); label.setAttribute("y", p[1] - 10);
        label.setAttribute("class", "chart-val");
        label.textContent = s.values[i];
        g.appendChild(label);
      });
    }
  }

  // legend
  if (nSeries > 1) {
    chart.series.forEach((s, si) => {
      const color = s.color || CHART_COLORS[si % CHART_COLORS.length];
      const lx = area.x0 + si * 140, ly = area.y0 - 24;
      const sw = document.createElementNS("http://www.w3.org/2000/svg", "rect");
      sw.setAttribute("x", lx); sw.setAttribute("y", ly - 9);
      sw.setAttribute("width", 10); sw.setAttribute("height", 10);
      sw.setAttribute("fill", color);
      g.appendChild(sw);
      const lt = document.createElementNS("http://www.w3.org/2000/svg", "text");
      lt.setAttribute("x", lx + 16); lt.setAttribute("y", ly);
      lt.setAttribute("class", "chart-legend");
      lt.textContent = s.name;
      g.appendChild(lt);
    });
  }
}

/* ════════════════════════════════════════════════════════
   MAP DRAWING — real OSM boundary
   Strategy:
     1. Nominatim search → get OSM relation ID
     2. Overpass API    → fetch real polygon geometry
     3. Reject bbox rectangles (≤ 6 points)
════════════════════════════════════════════════════════ */

function isBboxRect(geojson) {
  // Nominatim sometimes returns a 4-5 point rectangle (bounding box) instead
  // of the real polygon. Detect and reject these.
  if (geojson.type === "Polygon") {
    const pts = geojson.coordinates[0].length;
    return pts <= 6;
  }
  return false;
}

async function fetchOSMRelationGeoJSON(relationId, countryName) {
  // Overpass: fetch the full country boundary relation as GeoJSON
  const query = `[out:json][timeout:25];relation(${relationId});out geom;`;
  const res = await fetch("https://overpass-api.de/api/interpreter", {
    method: "POST",
    body: "data=" + encodeURIComponent(query),
  });
  const data = await res.json();
  if (!data.elements || !data.elements.length) return null;

  const rel = data.elements[0];
  // Collect outer members and build coordinates
  const outerWays = (rel.members || []).filter(m => m.type === "way" && m.role === "outer");

  if (!outerWays.length) return null;

  // Stitch ways into rings
  function stitchRings(ways) {
    const segments = ways.map(w => w.geometry.map(p => [p.lon, p.lat]));
    const rings = [];
    let current = segments.shift();
    while (segments.length > 0) {
      const lastPt = current[current.length - 1];
      const idx = segments.findIndex(s =>
        (Math.abs(s[0][0]-lastPt[0]) < 1e-6 && Math.abs(s[0][1]-lastPt[1]) < 1e-6));
      if (idx !== -1) {
        current = current.concat(segments.splice(idx, 1)[0].slice(1));
      } else {
        // Can't connect — push current ring and start new one
        rings.push(current);
        current = segments.shift();
      }
    }
    rings.push(current);
    return rings;
  }

  const rings = stitchRings(outerWays);
  const geometry = rings.length === 1
    ? { type: "Polygon", coordinates: [rings[0]] }
    : { type: "MultiPolygon", coordinates: rings.map(r => [r]) };

  return { type: "Feature", geometry, properties: { name: countryName } };
}

async function drawMap(countryName) {
  setStatus(`Looking up "${countryName}"…`);

  let geoFeature = null;
  let displayName = countryName;

  try {
    // Step 1: Nominatim search — no polygon here, just get the OSM relation ID
    const searchUrl = `https://nominatim.openstreetmap.org/search?` +
      `q=${encodeURIComponent(countryName)}&format=json&limit=10&accept-language=en`;

    const searchRes  = await fetch(searchUrl, { headers: { "Accept-Language": "en" } });
    const searchData = await searchRes.json();

    // Find country-level administrative relation
    const hit = searchData.find(d =>
      d.osm_type === "relation" &&
      (d.class === "boundary" || d.class === "place") &&
      (d.type === "administrative" || d.type === "country" || d.addresstype === "country")
    ) || searchData.find(d => d.osm_type === "relation");

    if (!hit) {
      setStatus(`Country not found: "${countryName}". Try the official English name.`);
      return;
    }

    displayName = hit.display_name.split(",")[0];
    setStatus(`Found ${displayName} (OSM relation ${hit.osm_id}) — fetching boundary…`);

    // Step 2: Overpass — fetch real polygon for that relation ID
    geoFeature = await fetchOSMRelationGeoJSON(hit.osm_id, displayName);

    // Step 3: fallback — try Nominatim polygon directly if Overpass fails
    if (!geoFeature) {
      setStatus(`Trying Nominatim polygon fallback…`);
      const polyUrl = `https://nominatim.openstreetmap.org/lookup?` +
        `osm_ids=R${hit.osm_id}&polygon_geojson=1&format=json&accept-language=en`;
      const polyRes  = await fetch(polyUrl);
      const polyData = await polyRes.json();
      const poly = polyData[0];
      if (poly && poly.geojson && !isBboxRect(poly.geojson)) {
        geoFeature = { type:"Feature", geometry: poly.geojson, properties:{ name: displayName } };
      }
    }

    if (!geoFeature) {
      setStatus(`Could not get boundary polygon for "${displayName}".`);
      return;
    }

  } catch(e) {
    setStatus(`Network error: ${e.message}`);
    return;
  }

  setStatus(`Drawing ${displayName}…`);

  // Fit D3 projection to THIS country inside the SVG canvas
  const projection = d3.geoMercator()
    .fitExtent([[PAD, PAD],[SVG_W-PAD, SVG_H-PAD]], geoFeature);
  const pathGen = d3.geoPath().projection(projection);
  const fullD   = pathGen(geoFeature);
  if (!fullD) { setStatus("No path data returned."); return; }

  // Split into sub-paths (islands/territories) — sort by length (mainland first)
  const subPaths = (fullD.match(/M[^M]+/g) || [fullD])
    .map(sp => sp.trim())
    .sort((a,b) => b.length - a.length);

  // Compute total path length for proportional timing
  let totalLen = 0;
  const measured = subPaths.map(sp => {
    const tmp = document.createElementNS("http://www.w3.org/2000/svg","path");
    tmp.setAttribute("d", sp); shapesG.appendChild(tmp);
    const l = tmp.getTotalLength(); shapesG.removeChild(tmp);
    totalLen += l;
    return {sp, l};
  });

  const baseMs = mapDur();

  for (const {sp, l} of measured) {
    // fill layer
    const fill = document.createElementNS("http://www.w3.org/2000/svg","path");
    fill.setAttribute("d", sp);
    fill.setAttribute("fill","#1e3a5f");
    fill.setAttribute("fill-opacity","0");
    fill.style.transition = "fill-opacity 500ms ease";
    shapesG.appendChild(fill);

    // stroke layer (pencil traces this)
    const stroke = document.createElementNS("http://www.w3.org/2000/svg","path");
    stroke.setAttribute("d", sp);
    stroke.setAttribute("fill","none");
    stroke.setAttribute("stroke","#4f8ef7");
    stroke.setAttribute("stroke-width","1.8");
    stroke.setAttribute("stroke-linecap","round");
    stroke.setAttribute("stroke-linejoin","round");
    shapesG.appendChild(stroke);

    const dur = totalLen > 0 ? Math.max(400, (l/totalLen)*baseMs) : baseMs;
    await traceEl(stroke, dur);
    fill.setAttribute("fill-opacity","0.82");

    // tiny gap between islands
    if (measured.length > 1) await sleep(80);
  }

  // Country name at centroid
  const centroid = pathGen.centroid(geoFeature);
  if (centroid && !isNaN(centroid[0])) {
    const lbl = document.createElementNS("http://www.w3.org/2000/svg","text");
    lbl.setAttribute("x", centroid[0]);
    lbl.setAttribute("y", centroid[1]);
    lbl.setAttribute("class","map-lbl");
    lbl.style.opacity="0"; lbl.style.transition="opacity 400ms ease";
    lbl.textContent = geoFeature.properties.name;
    shapesG.appendChild(lbl);
    setTimeout(()=>{ lbl.style.opacity="1"; }, 100);
  }

  setStatus(`${displayName} — done ✓`);
}

const sleep = ms => new Promise(r => setTimeout(r, ms));

/* ════════════════════════════════════════════════════════
   PROMPT ROUTER — decides: real map (OSM) or everything else
   (diagrams, freeform sketches, AND charts are all handled server-side
   by the same Gemini call now, so only the "real geographic map" case
   needs to be special-cased on the client — it needs actual OSM boundary
   data, which isn't something the drawing model can look up itself.)

   Any prompt containing the word "map" is treated as a map request. We
   strip filler words to find the place name; if nothing is left (e.g. a
   bare "draw map"), MAP_NEEDS_CLARIFICATION is returned instead of null.
════════════════════════════════════════════════════════ */
const MAP_NEEDS_CLARIFICATION = Symbol("needs_clarification");
const MAP_STOPWORDS = new Set([
  "draw","sketch","show","me","the","a","an","of","please","map","country",
  "on","board","for","boundary","borders","outline",
]);

function extractCountry(prompt) {
  if (!/\bmap\b/i.test(prompt)) return null;

  const words = prompt
    .replace(/[^\p{L}\p{N}\s]/gu, " ")
    .split(/\s+/)
    .filter(w => w && !MAP_STOPWORDS.has(w.toLowerCase()));

  if (!words.length) return MAP_NEEDS_CLARIFICATION;
  return words.join(" ");
}

async function draw() {
  const prompt = promptInput.value.trim();
  if (!prompt) return;

  const country = extractCountry(prompt);
  if (country === MAP_NEEDS_CLARIFICATION) {
    setStatus('Which place? Try "map of Nepal" or "Kathmandu map".');
    return;
  }

  drawBtn.disabled = true;
  clearStage();

  if (country) {
    await drawMap(country);
  } else {
    await drawShapes(prompt);
  }

  drawBtn.disabled = false;
}

/* ════════════════════════════════════════════════════════
   GEMINI DRAWING (POST to server.py)
   Handles BOTH structured diagrams (shapes/connectors) AND freeform
   sketches (paths) — the backend decides which tool(s) to call based
   on the prompt, and this renders whatever comes back onto the board.
════════════════════════════════════════════════════════ */
async function drawShapes(prompt) {
  setStatus("thinking…");
  try {
    const res = await fetch(SERVER_URL, {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({prompt}),
    });
    if (!res.ok) throw new Error(`server returned ${res.status}`);
    const data = await res.json();

    const placed = {};
    for (const s of (data.shapes||[])) {
      placed[s.id] = await drawShape(s);
      await sleep(80);
    }
    for (const c of (data.connectors||[])) {
      const fp=placed[c.from_shape_id], tp=placed[c.to_shape_id];
      if (fp&&tp) { drawConnector(fp,tp,c.label); await sleep(350/speed()); }
    }
    for (const p of (data.paths||[])) {
      await drawSketchPath(p);
      await sleep(60);
    }
    for (const c of (data.charts||[])) {
      await drawChart(c);
      await sleep(60);
    }

    const nothingDrawn = !(data.shapes?.length || data.paths?.length || data.charts?.length);
    setStatus(data.assistant_text || (nothingDrawn ? "no drawing returned" : "done ✓"));
  } catch(e) {
    setStatus(`Error: ${e.message} — is server.py running on :8000?`);
  }
}

/* ════════════════════════════════════════════════════════
   EVENTS
════════════════════════════════════════════════════════ */
drawBtn.addEventListener("click", draw);
promptInput.addEventListener("keydown", e => { if(e.key==="Enter") draw(); });
</script>
